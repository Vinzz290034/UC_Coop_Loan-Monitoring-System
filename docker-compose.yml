version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: uc_coop_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: uc_coop_loans
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

volumes:
  pgdata:
